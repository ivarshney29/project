<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Attendance System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 350px;
            text-align: center;
        }

        h2 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 5px;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00d2ff;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #3a7bd5; }

        .history {
            margin-top: 20px;
            font-size: 0.8em;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Attendance</h2>
        <form id="attendanceForm">
            <input type="text" id="name" placeholder="Enter Student Name" required>
            <select id="status">
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
                <option value="Late">Late</option>
            </select>
            <button type="submit">SUBMIT</button>
        </form>
        <div class="history" id="history">
            <b>Recent Logs:</b>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        // --- THREE.JS 3D BACKGROUND ---
        let scene, camera, renderer, stars, starGeo;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI / 2;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            starGeo = new THREE.BufferGeometry();
            let positions = [];
            for(let i=0; i<6000; i++) {
                positions.push(Math.random() * 600 - 300);
                positions.push(Math.random() * 600 - 300);
                positions.push(Math.random() * 600 - 300);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            let sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/circle.png');
            let starMaterial = new THREE.PointsMaterial({
                color: 0xaaaaaa,
                size: 0.7,
                map: sprite
            });

            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            animate();
        }

        // Mouse Move Interaction
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 100;
            mouseY = (e.clientY - window.innerHeight / 2) / 100;
        });

        function animate() {
            stars.rotation.y += 0.002;
            // React to mouse movement
            stars.position.x = mouseX;
            stars.position.y = -mouseY;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        init();

        // --- FORM SUBMISSION & AJAX ---
        const form = document.getElementById('attendanceForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('status', document.getElementById('status').value);

            const response = await fetch('/mark_attendance', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            alert(result.message);
            updateHistory();
            form.reset();
        });

        async function updateHistory() {
            const res = await fetch('/get_history');
            const data = await res.json();
            const logDiv = document.getElementById('logs');
            logDiv.innerHTML = data.map(item => `<p>${item[0]} - ${item[1]} <br><small>${item[2]}</small></p>`).join('');
        }

        updateHistory();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
